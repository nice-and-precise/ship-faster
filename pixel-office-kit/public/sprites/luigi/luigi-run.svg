<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="64" height="64">
  <!-- Luigi Running -->
  <g shape-rendering="crispEdges">
    <!-- Hat -->
    <rect x="5" y="0" width="8" height="2" fill="#00aa00"/>
    <rect x="4" y="1" width="10" height="2" fill="#00aa00"/>
    <!-- Face -->
    <rect x="5" y="3" width="8" height="3" fill="#ffcc99"/>
    <rect x="4" y="4" width="1" height="2" fill="#654321"/>
    <!-- Eyes -->
    <rect x="7" y="4" width="1" height="1" fill="#000000"/>
    <rect x="10" y="4" width="1" height="1" fill="#000000"/>
    <!-- Mustache -->
    <rect x="6" y="6" width="6" height="1" fill="#000000"/>
    <!-- Shirt -->
    <rect x="4" y="7" width="10" height="3" fill="#00aa00"/>
    <rect x="6" y="7" width="6" height="3" fill="#0000ff"/>
    <!-- Arm forward -->
    <rect x="12" y="7" width="3" height="2" fill="#00aa00"/>
    <rect x="14" y="6" width="2" height="2" fill="#ffcc99"/>
    <!-- Arm back -->
    <rect x="1" y="9" width="3" height="2" fill="#00aa00"/>
    <!-- Legs -->
    <rect x="5" y="10" width="3" height="3" fill="#0000ff"/>
    <rect x="9" y="10" width="3" height="2" fill="#0000ff"/>
    <rect x="9" y="12" width="4" height="2" fill="#0000ff"/>
    <!-- Shoes -->
    <rect x="4" y="13" width="4" height="2" fill="#654321"/>
    <rect x="12" y="13" width="3" height="2" fill="#654321"/>
  </g>
</svg>