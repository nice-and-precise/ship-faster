<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="64" height="64">
  <!-- Peach Standing -->
  <g shape-rendering="crispEdges">
    <!-- Crown -->
    <rect x="6" y="0" width="4" height="1" fill="#ffdd00"/>
    <rect x="5" y="1" width="6" height="1" fill="#ffdd00"/>
    <!-- Hair -->
    <rect x="3" y="1" width="10" height="3" fill="#ffdd55"/>
    <!-- Face -->
    <rect x="4" y="4" width="8" height="3" fill="#ffcc99"/>
    <!-- Eyes with lashes -->
    <rect x="5" y="5" width="1" height="1" fill="#000000"/>
    <rect x="10" y="5" width="1" height="1" fill="#000000"/>
    <rect x="5" y="4" width="1" height="1" fill="#000000"/>
    <rect x="10" y="4" width="1" height="1" fill="#000000"/>
    <!-- Dress top -->
    <rect x="4" y="7" width="8" height="3" fill="#ff69b4"/>
    <!-- Brooch -->
    <rect x="7" y="8" width="2" height="1" fill="#00aaff"/>
    <!-- Dress bottom -->
    <rect x="3" y="10" width="10" height="4" fill="#ff69b4"/>
    <rect x="2" y="12" width="12" height="2" fill="#ff1493"/>
    <!-- Shoes -->
    <rect x="4" y="14" width="3" height="2" fill="#ff0000"/>
    <rect x="9" y="14" width="3" height="2" fill="#ff0000"/>
  </g>
</svg>