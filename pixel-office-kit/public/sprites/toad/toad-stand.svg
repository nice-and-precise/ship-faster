<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="64" height="64">
  <!-- Toad Standing -->
  <g shape-rendering="crispEdges">
    <!-- Mushroom cap spots -->
    <rect x="2" y="0" width="3" height="2" fill="#ff0000"/>
    <rect x="11" y="0" width="3" height="2" fill="#ff0000"/>
    <!-- Mushroom cap white -->
    <rect x="0" y="1" width="16" height="3" fill="#ffffff"/>
    <rect x="1" y="0" width="1" height="2" fill="#ff0000"/>
    <rect x="6" y="0" width="4" height="2" fill="#ff0000"/>
    <rect x="14" y="0" width="1" height="2" fill="#ff0000"/>
    <!-- Face -->
    <rect x="3" y="4" width="10" height="3" fill="#ffcc99"/>
    <!-- Eyes -->
    <rect x="4" y="5" width="2" height="2" fill="#000000"/>
    <rect x="10" y="5" width="2" height="2" fill="#000000"/>
    <!-- Vest -->
    <rect x="2" y="7" width="12" height="3" fill="#0000ff"/>
    <rect x="4" y="7" width="8" height="3" fill="#ffffff"/>
    <!-- Pants -->
    <rect x="3" y="10" width="10" height="3" fill="#0000ff"/>
    <!-- Shoes -->
    <rect x="2" y="13" width="4" height="2" fill="#654321"/>
    <rect x="10" y="13" width="4" height="2" fill="#654321"/>
  </g>
</svg>