<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="64" height="64">
  <!-- Super Mushroom -->
  <g shape-rendering="crispEdges">
    <!-- Cap spots -->
    <rect x="0" y="0" width="4" height="3" fill="#ff0000"/>
    <rect x="12" y="0" width="4" height="3" fill="#ff0000"/>
    <rect x="6" y="0" width="4" height="2" fill="#ff0000"/>
    <!-- Cap white base -->
    <rect x="0" y="2" width="16" height="6" fill="#ffffff"/>
    <rect x="2" y="0" width="2" height="3" fill="#ff0000"/>
    <rect x="8" y="1" width="2" height="2" fill="#ff0000"/>
    <rect x="12" y="0" width="2" height="3" fill="#ff0000"/>
    <!-- Face -->
    <rect x="2" y="8" width="12" height="5" fill="#ffcc99"/>
    <!-- Eyes -->
    <rect x="3" y="9" width="3" height="4" fill="#000000"/>
    <rect x="10" y="9" width="3" height="4" fill="#000000"/>
    <rect x="4" y="10" width="1" height="2" fill="#ffffff"/>
    <rect x="11" y="10" width="1" height="2" fill="#ffffff"/>
  </g>
</svg>