<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 12 16" width="48" height="64">
  <!-- Gold Coin -->
  <g shape-rendering="crispEdges">
    <!-- Outer gold -->
    <rect x="2" y="0" width="8" height="1" fill="#ffaa00"/>
    <rect x="1" y="1" width="10" height="1" fill="#ffaa00"/>
    <rect x="0" y="2" width="12" height="12" fill="#ffcc00"/>
    <rect x="1" y="14" width="10" height="1" fill="#ffaa00"/>
    <rect x="2" y="15" width="8" height="1" fill="#ffaa00"/>
    <!-- Inner shine -->
    <rect x="2" y="2" width="8" height="10" fill="#ffdd44"/>
    <rect x="3" y="3" width="6" height="8" fill="#ffee77"/>
    <rect x="4" y="4" width="4" height="6" fill="#ffffaa"/>
    <!-- Detail lines -->
    <rect x="5" y="2" width="2" height="12" fill="#ffcc00"/>
  </g>
</svg>