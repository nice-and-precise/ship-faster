<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="64" height="64">
  <!-- Super Star -->
  <g shape-rendering="crispEdges">
    <!-- Star shape -->
    <rect x="7" y="0" width="2" height="16" fill="#ffdd00"/>
    <rect x="0" y="7" width="16" height="2" fill="#ffdd00"/>
    <rect x="2" y="2" width="12" height="12" fill="#ffdd00"/>
    <!-- Diagonal points -->
    <rect x="4" y="1" width="2" height="2" fill="#ffdd00"/>
    <rect x="10" y="1" width="2" height="2" fill="#ffdd00"/>
    <rect x="1" y="4" width="2" height="2" fill="#ffdd00"/>
    <rect x="13" y="4" width="2" height="2" fill="#ffdd00"/>
    <rect x="1" y="10" width="2" height="2" fill="#ffdd00"/>
    <rect x="13" y="10" width="2" height="2" fill="#ffdd00"/>
    <rect x="4" y="13" width="2" height="2" fill="#ffdd00"/>
    <rect x="10" y="13" width="2" height="2" fill="#ffdd00"/>
    <!-- Inner shine -->
    <rect x="6" y="6" width="4" height="4" fill="#ffff88"/>
    <rect x="7" y="7" width="2" height="2" fill="#ffffcc"/>
    <!-- Eyes -->
    <rect x="5" y="6" width="2" height="3" fill="#000000"/>
    <rect x="9" y="6" width="2" height="3" fill="#000000"/>
    <rect x="6" y="7" width="1" height="1" fill="#ffffff"/>
    <rect x="10" y="7" width="1" height="1" fill="#ffffff"/>
  </g>
</svg>